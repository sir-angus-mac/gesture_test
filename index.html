<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Canvas Paint & Gestures</title>

    <script src="jquery-1.9.1.min.js" type="text/javascript"></script>
    <script src="jquery.multitouch.js" type="text/javascript"></script>
    <link href="jquery.multitouch.css" rel="stylesheet" type="text/css">

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000; touch-action: none;
        }
        #canvas {
            width: 100vw; height: 100vh;
            display: block; image-rendering: pixelated;
            cursor: crosshair;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="480" height="854"></canvas>

    <script>
        /**
         * 1. BROWSER LOCKDOWN
         * Prevents "Passive Listener" errors and stops the browser 
         * from hijacking swipes for "Back/Forward" navigation.
         */
        document.addEventListener('touchstart', e => { e.preventDefault(); }, { passive: false });
        document.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });

        const WORLD_WIDTH = 480;
        const WORLD_HEIGHT = 854;
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        // Game Assets
        const bg = new Image(); bg.src = "background.jpg";
        const hero = new Image(); hero.src = "character.png";

        // Game State
        let currentMessage = "";
        let messageTimer = 0;
        let touchPath = []; 

        /**
         * 2. THE RENDER LOOP
         * Everything is drawn here 60 times per second.
         */
        function render() {
            ctx.imageSmoothingEnabled = false;

            // Clear Screen / Draw Background
            if (bg.complete) {
                ctx.drawImage(bg, 0, 0, WORLD_WIDTH, WORLD_HEIGHT);
            } else {
                ctx.fillStyle = "#1a1a1a";
                ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);
            }

            // Draw Hero
            if (hero.complete) {
                ctx.drawImage(hero, 0, 0, 80, 80);
            }

            // 3. PAINT FINGER MOVEMENT
            if (touchPath.length > 1) {
                ctx.beginPath();
                ctx.strokeStyle = "#00ffff"; // Cyan path
                ctx.lineWidth = 10;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                
                ctx.moveTo(touchPath[0].x, touchPath[0].y);
                for (let i = 1; i < touchPath.length; i++) {
                    ctx.lineTo(touchPath[i].x, touchPath[i].y);
                }
                ctx.stroke();
            }

            // 4. DRAW GESTURE TEXT
            if (messageTimer > 0) {
                ctx.font = "bold 60px Arial";
                ctx.textAlign = "center";
                // Black outline
                ctx.strokeStyle = "black";
                ctx.lineWidth = 8;
                ctx.strokeText(currentMessage, WORLD_WIDTH / 2, WORLD_HEIGHT / 2);
                // Yellow fill
                ctx.fillStyle = "yellow";
                ctx.fillText(currentMessage, WORLD_WIDTH / 2, WORLD_HEIGHT / 2);
                
                messageTimer--;
            }

            requestAnimationFrame(render);
        }

        /**
         * 3. JQMULTITOUCH ENGINE
         */
        $.touch.ready(function () {
            $('#canvas').touchable({
                touchMove: function (e, touchHistory) {
                    const rect = canvas.getBoundingClientRect();
                    // Maps actual screen touch to the 480x854 world
                    const scaleX = WORLD_WIDTH / rect.width;
                    const scaleY = WORLD_HEIGHT / rect.height;

                    touchPath.push({
                        x: (e.clientX - rect.left) * scaleX,
                        y: (e.clientY - rect.top) * scaleY
                    });
                },

                touchUp: function () {
                    touchPath = []; // Clear drawing when finger lifts
                },

                gesture: function (e, touchHistory) {
                    var th = touchHistory.stop({type: ['touchdown', 'touchup']})
                                         .filter({type: 'touchmove', time: '1..200'});

                    const sens = 50; // Swipe sensitivity
                    if (th.match({ deltaX: '<-' + sens })) showCanvasMessage('LEFT');
                    else if (th.match({ deltaX: '>' + sens }))  showCanvasMessage('RIGHT');
                    else if (th.match({ deltaY: '>' + sens }))  showCanvasMessage('DOWN');
                    else if (th.match({ deltaY: '<-' + sens })) showCanvasMessage('UP');
                }
            });

            function showCanvasMessage(s) {
                currentMessage = s;
                messageTimer = 45; // Stay on screen for ~0.75 seconds
            }

            render(); // Start loop
        });
    </script>
</body>
</html>
