<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Canvas Hero - Final Physics</title>

    <script src="jquery-1.9.1.min.js" type="text/javascript"></script>
    <script src="jquery.multitouch.js" type="text/javascript"></script>
    <link href="jquery.multitouch.css" rel="stylesheet" type="text/css">

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000; touch-action: none;
        }
        #canvas {
            width: 100vw; height: 100vh;
            display: block; image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="480" height="854"></canvas>

    <script>
    // --- SETUP ---
    document.addEventListener('touchstart', e => { e.preventDefault(); }, { passive: false });
    document.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });

    const WORLD_WIDTH = 480;
    const WORLD_HEIGHT = 854;
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const bg = new Image(); bg.src = "background.jpg";
    const HERO_LAYERS = ["leg_right", "leg_left", "body", "arm_left", "arm_right", "face", "mouth_shut", "mouth_open", "eyes_open", "eyelids", "eyebrows"];
    const heroImages = {};
    HERO_LAYERS.forEach(layer => {
        heroImages[layer] = new Image();
        heroImages[layer].src = `eren/${layer}.png`;
    });

    // --- PHYSICS & STATE ---
    const hero = {
        x: (WORLD_WIDTH / 2) - 40,
        y: 700,
        w: 80, h: 100,
        vx: 0, // Horizontal velocity
        vy: 0, // Vertical velocity
        gravity: 0.8,
        friction: 0.95, // Slows down horizontal movement over time
        minJump: -12,
        groundY: 700, 
        isGrounded: true,
        isBeingDragged: false
    };

    let currentMessage = "";
    let messageTimer = 0;
    let ripples = [];
    
    // Gesture Tracking
    let startX = 0; // Track start X for tossing
    let startY = 0;
    let startTime = 0; 
    let dragOffsetX = 0;
    let dragOffsetY = 0;
    let startedOnGround = false;

    function updatePhysics() {
        if (!hero.isBeingDragged) {
            // Apply Gravity
            hero.vy += hero.gravity;
            hero.y += hero.vy;

            // Apply Horizontal Velocity & Friction
            hero.x += hero.vx;
            hero.vx *= hero.friction;

            // Ground Collision
            if (hero.y >= hero.groundY) {
                hero.y = hero.groundY;
                hero.vy = 0;
                hero.isGrounded = true;
                // Stop horizontal sliding when on ground
                if (Math.abs(hero.vx) < 0.1) hero.vx = 0;
            } else {
                hero.isGrounded = false;
            }

            // Screen Wall Bouncing
            if (hero.x < 0) { hero.x = 0; hero.vx *= -0.5; } // Bounce off left
            if (hero.x > WORLD_WIDTH - hero.w) { hero.x = WORLD_WIDTH - hero.w; hero.vx *= -0.5; } // Bounce off right
        } else {
            hero.vy = 0;
            hero.vx = 0;
            hero.isGrounded = (hero.y >= hero.groundY - 5);
        }
    }

    function render() {
        updatePhysics();
        ctx.imageSmoothingEnabled = false;

        if (bg.complete) ctx.drawImage(bg, 0, 0, WORLD_WIDTH, WORLD_HEIGHT);
        else { ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT); }

        HERO_LAYERS.forEach(layer => {
            const img = heroImages[layer];
            if (!img.complete) return;
            const isYelling = (hero.vy < 0 || hero.isBeingDragged);
            if (layer === "mouth_shut" && isYelling) return; 
            if (layer === "mouth_open" && !isYelling) return;
            ctx.drawImage(img, hero.x, hero.y, hero.w, hero.h); 
        });

        for (let i = ripples.length - 1; i >= 0; i--) {
            let r = ripples[i];
            r.radius += 4; r.opacity -= 0.02;
            if (r.opacity <= 0) { ripples.splice(i, 1); continue; }
            ctx.beginPath(); ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 255, 255, ${r.opacity})`;
            ctx.lineWidth = 3; ctx.stroke();
        }

        if (messageTimer > 0) {
            ctx.font = "bold 60px Arial"; ctx.textAlign = "center";
            ctx.strokeStyle = "black"; ctx.lineWidth = 8;
            ctx.strokeText(currentMessage, WORLD_WIDTH / 2, WORLD_HEIGHT / 2);
            ctx.fillStyle = "yellow"; ctx.fillText(currentMessage, WORLD_WIDTH / 2, WORLD_HEIGHT / 2);
            messageTimer--;
        }
        requestAnimationFrame(render);
    }

    $.touch.ready(function () {
        $('#canvas').touchable({
            touchDown: function(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = WORLD_WIDTH / rect.width;
                const scaleY = WORLD_HEIGHT / rect.height;
                const tx = (e.clientX - rect.left) * scaleX;
                const ty = (e.clientY - rect.top) * scaleY;

                ripples.push({ x: tx, y: ty, radius: 5, opacity: 1.0 });
                
                startX = tx; // Save start X
                startY = ty; 
                startTime = Date.now();

                if (tx >= hero.x - 40 && tx <= hero.x + hero.w + 40 && 
                    ty >= hero.y - 40 && ty <= hero.y + hero.h + 40) {
                    
                    hero.isBeingDragged = true;
                    dragOffsetX = tx - hero.x;
                    dragOffsetY = ty - hero.y;
                    startedOnGround = hero.isGrounded; 
                }
            },

            touchMove: function(e) {
                if (hero.isBeingDragged) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = WORLD_WIDTH / rect.width;
                    const scaleY = WORLD_HEIGHT / rect.height;
                    const tx = (e.clientX - rect.left) * scaleX;
                    const ty = (e.clientY - rect.top) * scaleY;

                    hero.x = tx - dragOffsetX;
                    hero.y = ty - dragOffsetY;

                    if (hero.x < 0) hero.x = 0;
                    if (hero.x > WORLD_WIDTH - hero.w) hero.x = WORLD_WIDTH - hero.w;
                    if (hero.y > WORLD_HEIGHT - hero.h) hero.y = WORLD_HEIGHT - hero.h;
                }
            },

            touchUp: function(e) {
                if (!hero.isBeingDragged) return;

                const rect = canvas.getBoundingClientRect();
                const scaleX = WORLD_WIDTH / rect.width;
                const scaleY = WORLD_HEIGHT / rect.height;
                const clientX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
                const clientY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
                
                const endX = (clientX - rect.left) * scaleX;
                const endY = (clientY - rect.top) * scaleY;

                const diffX = endX - startX; // Positive = Right, Negative = Left
                const diffY = startY - endY; 
                const duration = Date.now() - startTime;

                if (startedOnGround && diffY > 70 && duration < 300) {
                    // Upward Boost
                    let boostY = Math.min(diffY / 5, 30);
                    hero.vy = hero.minJump - boostY;

                    // Horizontal Toss Boost (The new part!)
                    // Dividing by 10 makes the toss feel natural
                    hero.vx = diffX / 10; 

                    showCanvasMessage("TOSS!"); 
                } 

                hero.isBeingDragged = false;
                startedOnGround = false;
            },

            gesture: function (e, touchHistory) {
                if (hero.isBeingDragged) return;
                var th = touchHistory.filter({type: 'touchmove', time: '1..300'});
                if (th.length === 0) return; 

                if (th.match({ deltaX: '<-' + 40 })) showCanvasMessage('LEFT');
                else if (th.match({ deltaX: '>' + 40 })) showCanvasMessage('RIGHT');
                else if (th.match({ deltaY: '>' + 40 })) showCanvasMessage('DOWN');
            }
        });

        function showCanvasMessage(s) {
            currentMessage = s;
            messageTimer = 45; 
        }

        render();
    });
</script> // great!!!!  
</body>
</html>
