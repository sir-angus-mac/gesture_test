<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Hero Game</title>
    <script src="jquery-1.9.1.min.js"></script>
    <script src="jquery.multitouch.js"></script>
    <link href="jquery.multitouch.css" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
        #canvas { width: 100vw; height: 100vh; display: block; image-rendering: pixelated; }
        #status { position: absolute; bottom: 10px; left: 10px; color: #555; font-family: monospace; font-size: 10px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="status">Engine Starting...</div>

    <canvas id="canvas" width="480" height="854"></canvas>

    <script>
    const WORLD_WIDTH = 480;
    const WORLD_HEIGHT = 854;
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusDiv = document.getElementById("status");

    // --- ASSET PREPARATION ---
    const HERO_LAYERS = ["leg_right", "leg_left", "body", "arm_left", "arm_right", "face", "mouth_shut", "mouth_open", "eyes_open", "eyelids", "eyebrows"];
    const heroImages = {};
    let loadedCount = 0;

    // Load Background
    const bg = new Image();
    bg.src = "background.jpg";
    bg.onload = () => { updateStatus("Background Loaded"); };

    // Load Hero Layers
    HERO_LAYERS.forEach(layer => {
        const img = new Image();
        img.onload = () => { 
            loadedCount++; 
            updateStatus(`Layers: ${loadedCount}/${HERO_LAYERS.length}`); 
        };
        img.onerror = () => {
            updateStatus(`ERROR: ${layer}.png not found`);
        };
        img.src = `eren/${layer}.png`;
        heroImages[layer] = img;
    });

    function updateStatus(msg) {
        statusDiv.innerHTML = msg;
        if(loadedCount >= HERO_LAYERS.length) {
            setTimeout(() => { statusDiv.style.display = 'none'; }, 2000);
        }
    }

    // --- PHYSICS & STATE ---
    const hero = {
        x: 200, y: 700, w: 80, h: 100, vx: 0, vy: 0,
        gravity: 0.8, friction: 0.95, groundY: 700, 
        isGrounded: true, isBeingDragged: false
    };

    let startX, startY, startTime, dragOffsetX, dragOffsetY, startedOnGround;
    let currentMessage = "";
    let messageTimer = 0;
    let ripples = [];

    function updatePhysics() {
        if (!hero.isBeingDragged) {
            hero.vy += hero.gravity;
            hero.y += hero.vy;
            hero.x += hero.vx;
            hero.vx *= hero.friction;
            if (hero.y >= hero.groundY) {
                hero.y = hero.groundY; hero.vy = 0; hero.isGrounded = true;
                if (Math.abs(hero.vx) < 0.1) hero.vx = 0;
            } else { hero.isGrounded = false; }
            if (hero.x < 0) { hero.x = 0; hero.vx *= -0.5; }
            if (hero.x > WORLD_WIDTH - hero.w) { hero.x = WORLD_WIDTH - hero.w; hero.vx *= -0.5; }
        } else {
            hero.vy = 0; hero.vx = 0;
            hero.isGrounded = (hero.y >= hero.groundY - 5);
        }
    }

    function render() {
        updatePhysics();
        ctx.fillStyle = "#111"; // Fallback color
        ctx.fillRect(0,0, WORLD_WIDTH, WORLD_HEIGHT);
        
        // Background
        if (bg.complete) ctx.drawImage(bg, 0, 0, WORLD_WIDTH, WORLD_HEIGHT);

        // Hero Layers
        HERO_LAYERS.forEach(layer => {
            const img = heroImages[layer];
            if (!img.complete) return;
            const isYelling = (hero.vy < 0 || hero.isBeingDragged);
            if (layer === "mouth_shut" && isYelling) return;
            if (layer === "mouth_open" && !isYelling) return;
            ctx.drawImage(img, hero.x, hero.y, hero.w, hero.h);
        });

        // Ripples
        for (let i = ripples.length - 1; i >= 0; i--) {
            let r = ripples[i];
            r.radius += 4; r.opacity -= 0.02;
            if (r.opacity <= 0) { ripples.splice(i,1); continue; }
            ctx.beginPath(); ctx.arc(r.x, r.y, r.radius, 0, Math.PI*2);
            ctx.strokeStyle = `rgba(255,255,255,${r.opacity})`;
            ctx.lineWidth = 3; ctx.stroke();
        }

        if (messageTimer > 0) {
            ctx.font = "bold 60px Arial"; ctx.textAlign = "center";
            ctx.strokeStyle = "black"; ctx.lineWidth = 8;
            ctx.strokeText(currentMessage, WORLD_WIDTH/2, WORLD_HEIGHT/2);
            ctx.fillStyle = "yellow"; ctx.fillText(currentMessage, WORLD_WIDTH/2, WORLD_HEIGHT/2);
            messageTimer--;
        }
        requestAnimationFrame(render);
    }

    // --- INPUT ---
    $.touch.ready(function() {
        $('#canvas').touchable({
            touchDown: function(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = WORLD_WIDTH/rect.width, scaleY = WORLD_HEIGHT/rect.height;
                const tx = (e.clientX - rect.left)*scaleX, ty = (e.clientY - rect.top)*scaleY;
                ripples.push({x:tx, y:ty, radius:5, opacity:1});
                startX = tx; startY = ty; startTime = Date.now();
                if (tx >= hero.x-40 && tx <= hero.x+hero.w+40 && ty >= hero.y-40 && ty <= hero.y+hero.h+40) {
                    hero.isBeingDragged = true; dragOffsetX = tx-hero.x; dragOffsetY = ty-hero.y; startedOnGround = hero.isGrounded;
                }
            },
            touchMove: function(e) {
                if (!hero.isBeingDragged) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = WORLD_WIDTH/rect.width, scaleY = WORLD_HEIGHT/rect.height;
                const tx = (e.clientX - rect.left)*scaleX, ty = (e.clientY - rect.top)*scaleY;
                hero.x = tx-dragOffsetX; hero.y = ty-dragOffsetY;
            },
            touchUp: function(e) {
                if (!hero.isBeingDragged) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = WORLD_WIDTH/rect.width, scaleY = WORLD_HEIGHT/rect.height;
                const clientX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
                const clientY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
                const endX = (clientX - rect.left)*scaleX, endY = (clientY - rect.top)*scaleY;
                const diffX = endX-startX, diffY = startY-endY, duration = Date.now()-startTime;
                if (startedOnGround && diffY > 70 && duration < 300) {
                    hero.vy = -12 - Math.min(diffY/5, 30); hero.vx = diffX/10;
                    currentMessage = "TOSS!"; messageTimer = 45;
                }
                hero.isBeingDragged = false;
            }
        });
        render(); // Start rendering immediately
    });

    </script>
</body>
</html>
