<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Canvas Paint, Gestures & Ripples</title>

    <script src="jquery-1.9.1.min.js" type="text/javascript"></script>
    <script src="jquery.multitouch.js" type="text/javascript"></script>
    <link href="jquery.multitouch.css" rel="stylesheet" type="text/css">

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000; touch-action: none;
        }
        #canvas {
            width: 100vw; height: 100vh;
            display: block; image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="480" height="854"></canvas>

    <script>
        document.addEventListener('touchstart', e => { e.preventDefault(); }, { passive: false });
        document.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });

        const WORLD_WIDTH = 480;
        const WORLD_HEIGHT = 854;
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const bg = new Image(); bg.src = "background.jpg";
        const hero = new Image(); hero.src = "character.png";

        // --- GAME STATE ---
        let currentMessage = "";
        let messageTimer = 0;
        let touchPath = []; 
        let ripples = []; // New array to hold active ripple effects

        function render() {
            ctx.imageSmoothingEnabled = false;

            // 1. Draw Background
            if (bg.complete) {
                ctx.drawImage(bg, 0, 0, WORLD_WIDTH, WORLD_HEIGHT);
            } else {
                ctx.fillStyle = "#1a1a1a";
                ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);
            }

            // 2. Draw Hero
            if (hero.complete) {
                ctx.drawImage(hero, 0, 0, 80, 80); 
            }

            // 3. DRAW RIPPLES (Echoing Circles)
            for (let i = ripples.length - 1; i >= 0; i--) {
                let r = ripples[i];
                r.radius += 4;      // Speed of expansion
                r.opacity -= 0.02;  // Speed of fade

                if (r.opacity <= 0) {
                    ripples.splice(i, 1); // Remove dead ripples
                    continue;
                }

                ctx.beginPath();
                ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${r.opacity})`; // White fading circle
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            // 4. PAINT FINGER MOVEMENT
            if (touchPath.length > 1) {
                ctx.beginPath();
                ctx.strokeStyle = "#00ffff";
                ctx.lineWidth = 10;
                ctx.lineCap = "round";
                ctx.moveTo(touchPath[0].x, touchPath[0].y);
                for (let i = 1; i < touchPath.length; i++) {
                    ctx.lineTo(touchPath[i].x, touchPath[i].y);
                }
                ctx.stroke();
            }

            // 5. DRAW GESTURE TEXT
            if (messageTimer > 0) {
                ctx.font = "bold 60px Arial";
                ctx.textAlign = "center";
                ctx.strokeStyle = "black";
                ctx.lineWidth = 8;
                ctx.strokeText(currentMessage, WORLD_WIDTH / 2, WORLD_HEIGHT / 2);
                ctx.fillStyle = "yellow";
                ctx.fillText(currentMessage, WORLD_WIDTH / 2, WORLD_HEIGHT / 2);
                messageTimer--;
            }

            requestAnimationFrame(render);
        }

        $.touch.ready(function () {
            $('#canvas').touchable({
                // Triggers exactly when the finger hits the glass
                touchDown: function(e) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = WORLD_WIDTH / rect.width;
                    const scaleY = WORLD_HEIGHT / rect.height;

                    // Add a new ripple at the touch point
                    ripples.push({
                        x: (e.clientX - rect.left) * scaleX,
                        y: (e.clientY - rect.top) * scaleY,
                        radius: 5,
                        opacity: 1.0
                    });
                },

                touchMove: function (e) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = WORLD_WIDTH / rect.width;
                    const scaleY = WORLD_HEIGHT / rect.height;

                    touchPath.push({
                        x: (e.clientX - rect.left) * scaleX,
                        y: (e.clientY - rect.top) * scaleY
                    });
                },

                touchUp: function () {
                    touchPath = [];
                },

                gesture: function (e, touchHistory) {
                    var th = touchHistory.stop({type: ['touchdown', 'touchup']})
                                         .filter({type: 'touchmove', time: '1..200'});

                    const sens = 50;
                    if (th.match({ deltaX: '<-' + sens })) showCanvasMessage('LEFT');
                    else if (th.match({ deltaX: '>' + sens }))  showCanvasMessage('RIGHT');
                    else if (th.match({ deltaY: '>' + sens }))  showCanvasMessage('DOWN');
                    else if (th.match({ deltaY: '<-' + sens })) showCanvasMessage('UP');
                }
            });

            function showCanvasMessage(s) {
                currentMessage = s;
                messageTimer = 45; 
            }

            render();
        });
    </script>
</body>
</html>
